version: '3.8'

services:
  wechat-pay-callback:
    build: .
    container_name: linux-wechat-pay-callback
    restart: unless-stopped
    
    # 网络模式
    network_mode: host
    
    # 环境变量
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=${DISPLAY:-:0}
      - DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS}
    
    # 卷挂载
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /run/user/1000/bus:/run/user/1000/bus
      - /var/run/dbus:/var/run/dbus
    
    # 设备访问
    devices:
      - /dev/dri:/dev/dri
    
    # 特权模式（用于访问DBus和显示）
    privileged: true
    
    # 端口映射（如果使用bridge网络）
    # ports:
    #   - "8888:8888"
    #   - "8889:8889"
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 可选：Web管理界面
  web-ui:
    image: nginx:alpine
    container_name: wechat-pay-webui
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./web-ui:/usr/share/nginx/html:ro
    depends_on:
      - wechat-pay-callback
    profiles:
      - with-ui
