version: '3.8'

# =============================================================================
# Linux微信 + VNC远程访问 + 微信支付回调 一体化Docker Compose配置
# =============================================================================

services:
  wechat-vnc:
    build:
      context: .
      dockerfile: docker/Dockerfile.vnc
      args:
        WECHAT_VERSION: "4.0.0"
    
    container_name: linux-wechat-vnc
    hostname: wechat-vnc
    
    # 容器重启策略
    restart: unless-stopped
    
    # 特权模式（微信桌面应用需要）
    privileged: true
    
    # 环境变量
    env_file:
      - config.env
    
    environment:
      # VNC配置
      - VNC_PORT=5901
      - NOVNC_PORT=6080
      - VNC_COL_DEPTH=24
      
      # 显示和输入法
      - DISPLAY=:1
      - GTK_IM_MODULE=fcitx
      - QT_IM_MODULE=fcitx
      - XMODIFIERS=@im=fcitx
      - LANG=zh_CN.UTF-8
      
      # 微信支付服务配置
      - PYTHONUNBUFFERED=1
      
      # 解密项目目录
      - DECRYPT_PROJECT_DIR=/root/wechat-decrypt
    
    # 端口映射
    ports:
      # VNC原生访问（5900 + display number）
      - "${VNC_EXTERNAL_PORT:-5901}:5901"
      # noVNC浏览器访问
      - "${NOVNC_EXTERNAL_PORT:-6080}:6080"
      # 微信支付回调API
      - "${API_PORT:-8888}:8888"
      # 管理API
      - "${ADMIN_PORT:-8889}:8889"
    
    # 数据卷挂载
    volumes:
      # 不挂载 config.yaml，让容器使用构建时复制的文件并允许 start-vnc.sh 修改
      
      # 数据持久化
      - ./data:/app/data
      - ./data/wechat:/root/.config/wechat
      - ./data/fcitx:/root/.config/fcitx
      
      # 日志持久化
      - ./logs:/var/log/supervisor
    
    # 设备访问（图形加速）
    devices:
      - /dev/dri:/dev/dri
    
    # 网络配置（使用桥接网络）
    networks:
      - wechat-vnc-net
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# 可选：Nginx反向代理（生产环境建议启用）
# =============================================================================
  nginx:
    image: docker.1ms.run/library/nginx:alpine
    container_name: wechat-vnc-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - wechat-vnc
    networks:
      - wechat-vnc-net
    profiles:
      - with-nginx

# =============================================================================
# 网络配置
# =============================================================================
networks:
  wechat-vnc-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# =============================================================================
# 数据卷声明
# =============================================================================
volumes:
  wechat-data:
    driver: local
  wechat-logs:
    driver: local
  vnc-data:
    driver: local
