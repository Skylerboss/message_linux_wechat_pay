# Linux微信支付回调系统配置
# 复制此文件为 config.yaml 并根据需要修改

version: "1.0.0"

# 调试模式
debug: false
log_level: INFO

# 数据存储目录
data_dir: "./data"

# ============================================
# 回调配置（重要！）
# ============================================
callback:
  enabled: true

  # 你的回调URL，支付通知会发送到这里
  # 示例: https://yourdomain.com/api/payment/callback
  # 本地测试: http://localhost:3000/webhook
  url: ""

  # 用于签名验证的密钥（可选但推荐）
  # 你的服务器需要验证此签名以确保请求来自本系统
  secret_key: null

  # HTTP请求超时时间（秒）
  timeout: 10

  # 失败重试次数
  retry_count: 3

  # 重试间隔（秒），每次递增
  retry_delay: 1.0

# ============================================
# DBus通知监听配置
# ============================================
dbus:
  enabled: true

  # 监听时长（秒），null表示一直运行
  monitor_duration: null

  # 支付关键词过滤器
  # 当通知标题或内容包含这些关键词时，会尝试解析为支付通知
  filter_keywords:
    - "收款"
    - "支付"
    - "赞赏"
    - "收到"
    - "入账"
    - "转账"

# ============================================
# OCR截图识别配置
# ============================================
ocr:
  # 当前支付主链路默认不启用 OCR。
  # 现阶段主要使用 biz_message_0.db 提前识别 + session.db 后备检测。
  enabled: false

  # OCR引擎选择（仅在你手动恢复 OCR 流程时使用）
  # - auto: 自动选择（推荐）
  # - tesseract: Tesseract OCR（需要安装）
  # - easyocr: EasyOCR（自动下载）
  engine: "auto"

  # OCR语言设置
  # tesseract: chi_sim+eng
  # easyocr: 自动检测
  language: "chi_sim+eng"

  # 置信度阈值（0-1），低于此值的识别结果会被忽略
  confidence_threshold: 0.6

  # 扫描间隔（秒）
  scan_interval: 2.0

  # 指定扫描区域 [x, y, width, height]
  # null表示扫描全屏
  # 示例: [100, 100, 800, 600] 表示从(100,100)开始扫描800x600区域
  scan_region: null

  # 当前默认不作为支付主检测方式
  fallback_mode: false

# ============================================
# 数据库监听配置（当前推荐主检测方式）
# ============================================
database_monitor:
  enabled: true
  decrypt_project_dir: "/root/wechat-decrypt"
  session_db_path: "/root/wechat-decrypt/decrypted/session/session.db"
  poll_interval: 2.0
  summary_keywords:
    - "收款"
    - "到账"
    - "二维码"
    - "赞赏"
    - "微信支付"
  trusted_usernames:
    - "brandservicesessionholder"
  trusted_sender_names:
    - "微信收款助手"

# ============================================
# 普通消息数据库监听配置（可选）
# ============================================
message_monitor:
  enabled: false
  decrypt_project_dir: "/root/wechat-decrypt"
  callback_url: "http://127.0.0.1:5000/api/adapter/linux_wechat/message"
  secret_key: null
  poll_interval: 2.0
  include_message_types:
    - "text"
    - "image"
    - "voice"
    - "video"

# ============================================
# 本地服务器配置
# ============================================
server:
  enabled: true

  # 监听地址
  # 0.0.0.0 表示监听所有网络接口
  # 127.0.0.1 表示仅监听本地
  host: "0.0.0.0"

  # HTTP API端口
  port: 8888

  # WebSocket端口（预留）
  websocket_port: 8889

  # 最大支付记录存储数量
  max_records: 1000

  # 启用webhook接收
  enable_webhook: true

# ============================================
# 订单关联配置
# ============================================
order_config:
  # 启用自动订单ID生成
  enable_auto_order_id: true

  # 订单ID前缀
  order_id_prefix: "WXP"

  # 金额微调步长（用于区分并发订单）
  # 例如: 30元 + 0.01 = 30.01, 30.02, 30.03...
  amount_variation_step: 0.01

  # 最大微调金额
  amount_variation_max: 0.99

# ============================================
# 通知配置
# ============================================
notification:
  # 启用声音提醒
  enable_sound: false

  # 声音文件路径（null使用系统默认）
  sound_file: null

  # 启用桌面通知
  enable_desktop_notification: true

  # 支付成功时显示的通知标题
  on_payment_success: "支付成功通知"
