# Linux微信 + VNC环境专用配置文件
# 用于Docker容器内部的微信支付回调服务

# =============================================================================
# 回调配置
# =============================================================================
callback:
  # HTTP回调URL - 通知业务系统支付结果
  # 使用环境变量 CALLBACK_URL 覆盖，默认为空字符串需要用户设置
  url: "${CALLBACK_URL}"
  secret_key: "${CALLBACK_SECRET_KEY}"
  
  # 回调重试配置
  timeout: 30
  max_retries: 3
  retry_delay: 5

# =============================================================================
# 微信支付回调服务器API
# =============================================================================
callback_server:
  host: "0.0.0.0"
  port: 8888
  debug: false
  
  # CORS配置（允许跨域访问API）
  cors:
    enabled: true
    origins: ["*"]

# =============================================================================
# 数据库监听配置（检测 session_db PayMsg 表支付）
# =============================================================================
database_monitor:
  enabled: true
  # 微信数据库解密项目目录（容器内路径）
  decrypt_project_dir: "/root/wechat-decrypt"
  session_db_path: "/root/wechat-decrypt/decrypted/session/session.db"
  # 轮询间隔（秒）- 减少到 1 秒提高响应速度
  poll_interval: 1.0
  auto_decrypt: true

# =============================================================================
# 消息数据库监听（已禁用，使用 database_monitor 检测支付）
# =============================================================================
message_monitor:
  enabled: false
  decrypt_project_dir: "/root/wechat-decrypt"
  callback_url: "http://127.0.0.1:8888/api/adapter/linux_wechat/message"
  # 轮询间隔（秒）- 减少到 0.5 秒提高响应速度
  poll_interval: 0.5

# =============================================================================
# OCR配置（当前版本已退出支付主链路）
# =============================================================================
ocr:
  enabled: false
  fallback_mode: false
  scan_interval: 2.0

# =============================================================================
# 订单管理
# =============================================================================
order_config:
  # 启用自动订单ID生成
  enable_auto_order_id: true
  order_id_prefix: "WXP"
  # 金额微调配置（用于并发订单区分）
  amount_variation_step: 0.01
  amount_variation_max: 0.99
  # 订单超时时间（分钟）
  order_timeout: 10

# =============================================================================
# 去重配置
# =============================================================================
deduplication:
  # 跨来源去重时间窗口（秒）
  time_window: 30
  # 存储历史记录数量
  history_size: 1000

# =============================================================================
# 日志配置
# =============================================================================
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/var/log/supervisor/wechat-pay.log"
  max_size: "10M"
  backup_count: 5

# =============================================================================
# Docker环境特殊配置
# =============================================================================
docker:
  # 标记当前运行环境为Docker
  is_docker: true
  # VNC显示编号
  vnc_display: 1
  # 微信进程检查间隔
  wechat_check_interval: 30
