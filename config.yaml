# Linux微信支付回调系统配置
version: "1.0.0"

# 调试模式
debug: false
log_level: INFO

# 数据存储目录
data_dir: "./data"

# 回调配置
callback:
  enabled: true
  url: "http://127.0.0.1:5000/api/payment/notify/linux_wechat"  # 你的回调URL，如: https://yourdomain.com/api/payment/notify/linux_wechat
  secret_key:   # 用于签名验证的密钥
  timeout: 10
  retry_count: 3
  retry_delay: 1.0

# DBus通知监听配置
dbus:
  enabled: false
  monitor_duration: null  # null表示一直运行
  filter_keywords:
    - "收款"
    - "支付"
    - "赞赏"
    - "收到"
    - "入账"
    - "转账"

# OCR截图识别配置
ocr:
  enabled: true
  engine: "tesseract"  # auto, tesseract, easyocr
  language: "chi_sim+eng"
  confidence_threshold: 0.5
  scan_interval: 1.0  # 扫描间隔（秒）
  scan_region:  [780, 0, 500, 320]   # 指定扫描区域 [x, y, width, height]，null为全屏
  fallback_mode: true  # 当DBus不可用时作为主要检测方式

# 本地服务器配置
server:
  enabled: true
  host: "0.0.0.0"
  port: 8888
  websocket_port: 8889
  max_records: 1000
  enable_webhook: true

# 订单关联配置
order_config:
  enable_auto_order_id: true
  order_id_prefix: "WXP"
  amount_variation_step: 0.01  # 金额微调步长（用于区分并发订单）
  amount_variation_max: 0.99   # 最大微调金额

# 通知配置
notification:
  enable_sound: false
  enable_desktop_notification: true
  sound_file: null
  on_payment_success: "支付成功通知"
